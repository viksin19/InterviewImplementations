spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: my-super-secret-key-for-demo-purpose-which-is-long-enough
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

logging:
  level:
    org.springframework: INFO
